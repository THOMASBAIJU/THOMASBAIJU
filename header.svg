    <rect x="36" y="-16" width="6" height="16" fill="#a78bfa" rx="2" style="transform-origin:0 100%;animation:barAnim 1.3s ease-in-out infinite .6s"/>
    <rect x="45" y="-28" width="6" height="28" fill="#a78bfa" rx="2" style="transform-origin:0 100%;animation:barAnim 1.4s ease-in-out infinite .3s"/>
    <rect x="54" y="-22" width="6" height="22" fill="#fbbf24" rx="2" style="transform-origin:0 100%;animation:barAnim 1.6s ease-in-out infinite .5s"/>
    <rect x="63" y="-38" width="6" height="38" fill="#fbbf24" rx="2" style="transform-origin:0 100%;animation:barAnim 1.2s ease-in-out infinite .7s"/>
    <rect x="72" y="-18" width="6" height="18" fill="#36bcf7" rx="2" style="transform-origin:0 100%;animation:barAnim 1.8s ease-in-out infinite .2s"/>
    <rect x="81" y="-30" width="6" height="30" fill="#36bcf7" rx="2" style="transform-origin:0 100%;animation:barAnim 1.3s ease-in-out infinite .8s"/>
    <rect x="90" y="-26" width="6" height="26" fill="#4ade80" rx="2" style="transform-origin:0 100%;animation:barAnim 1.5s ease-in-out infinite .4s"/>
    <rect x="99" y="-32" width="6" height="32" fill="#a78bfa" rx="2" style="transform-origin:0 100%;animation:barAnim 1.4s ease-in-out infinite .6s"/>
