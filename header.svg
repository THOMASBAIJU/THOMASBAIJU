<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes twinkle   { 0%,100%{opacity:.15} 50%{opacity:1} }
  @keyframes blink     { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes steam     { 0%{opacity:.7;transform:translateY(0)scaleX(1)} 100%{opacity:0;transform:translateY(-18px)scaleX(1.5)} }
  @keyframes typeL     { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(5deg)} }
  @keyframes typeR     { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-5deg)} }
  @keyframes barAnim   { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.7)} }
  @keyframes glow      { 0%,100%{opacity:.75} 50%{opacity:1} }
  @keyframes ledBlink  { 0%,100%{opacity:1} 50%{opacity:.15} }
  @keyframes headNod   { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-1.5px)} 75%{transform:translateY(.5px)} }
  @keyframes scroll    { 0%{transform:translateY(0)} 50%{transform:translateY(-10px)} 100%{transform:translateY(0)} }
</style>
<defs>
  <linearGradient id="bg"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#050b17"/><stop offset="100%" stop-color="#091321"/></linearGradient>
  <linearGradient id="flr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#0b1623"/><stop offset="100%" stop-color="#060e19"/></linearGradient>
  <linearGradient id="dsk" x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#3e2312"/><stop offset="100%" stop-color="#20110a"/></linearGradient>
  <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%"   stop-color="#0e1f3c"/><stop offset="100%" stop-color="#091524"/></linearGradient>
  <linearGradient id="topL" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#050b17" stop-opacity="0"/>
    <stop offset="25%"  stop-color="#36bcf7"/><stop offset="50%" stop-color="#a78bfa"/>
    <stop offset="75%"  stop-color="#36bcf7"/>
    <stop offset="100%" stop-color="#050b17" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="bloom" cx="50%" cy="50%" r="55%">
    <stop offset="0%"   stop-color="#1855a0" stop-opacity=".3"/>
    <stop offset="100%" stop-color="#091524" stop-opacity="0"/>
  </radialGradient>
  <filter id="gf" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cp1"><rect x="384" y="84"  width="212" height="116" rx="4"/></clipPath>
  <clipPath id="cp2"><rect x="634" y="122" width="118" height="82"  rx="3"/></clipPath>
</defs>

